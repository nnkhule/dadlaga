services:
  sqlserver:
    image: mcr.microsoft.com/mssql/server:2022-latest
    environment:
      ACCEPT_EULA: "Y"
      MSSQL_SA_PASSWORD: "YourStrong@Passw0rd"
    ports:
      - "1433:1433"
    volumes:
      - sqlserver_data:/var/opt/mssql
    healthcheck:
      test: /opt/mssql-tools18/bin/sqlcmd -S localhost -U sab -P "YourStrong@Passw0rd" -C -Q "SELECT 1" || exit 1
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - attendance-net

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - attendance-net

  attendance-api:
    build:
      context: .
      dockerfile: src/AttendanceSystem.API/Dockerfile
    ports:
      - "5000:8080"
      - "7000:8081"
    environment:
      ASPNETCORE_ENVIRONMENT: Development
      ConnectionStrings__DefaultConnection: "Server=sqlserver,1433;Database=AttendanceDB;User Id=sa;Password=YourStrong@Passw0rd;TrustServerCertificate=True;"
      ConnectionStrings__Redis: "redis:6379"
      JwtSettings__SecretKey: "DockerDevSecretKey_ChangeInProduction_32chars!"
    depends_on:
      sqlserver:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      - attendance-net

  seq:
    image: datalust/seq:latest
    environment:
      ACCEPT_EULA: "Y"
    ports:
      - "5341:80"
    networks:
      - attendance-net
    profiles:
      - dev

  compreface-postgres-db:
    image: postgres:14
    environment:
      POSTGRES_USER: compreface
      POSTGRES_PASSWORD: compreface
      POSTGRES_DB: compreface
    volumes:
      - compreface_db:/var/lib/postgresql/data
    networks:
      - attendance-internal
    profiles:
      - face

  compreface:
    image: exadel/compreface:latest
    ports:
      - "8000:8000"
    depends_on:
      - compreface-postgres-db
    networks:
      - attendance-internal
      - attendance-net
    profiles:
      - face

  ollama:
    image: ollama/ollama:latest
    ports:
      - "11434:11434"
    volumes:
      - ollama_data:/root/.ollama
    networks:
      - attendance-net
    profiles:
      - ai

volumes:
  sqlserver_data:
  redis_data:
  compreface_db:
  ollama_data:

networks:
  attendance-net:
    driver: bridge
  attendance-internal:
    driver: bridge
    internal: true
